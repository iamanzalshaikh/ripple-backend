name: Deploy Backend to EC2 with Docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          command_timeout: 30m
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/herridez/HerRidez-backend
            cd ~/herridez/HerRidez-backend

            # Clone or update code
            if [ ! -d ".git" ]; then
              git clone git@github.com:EGC-india/HerRidez-backend.git .
            else
              git fetch --all
              git reset --hard origin/main
              git pull origin main
            fi

            # Ensure .env.production exists on the server to prevent errors
            if [ ! -f ".env.production" ]; then
               echo "Warning: .env.production not found in ~/herridez/HerRidez-backend."
               echo "Docker Compose requires this file to start the container."
            fi

            # Build and restart containers using Docker Compose
            sudo docker compose up -d --build

            # Prune old images to save space
            sudo docker image prune -f
            sudo docker builder prune -f
