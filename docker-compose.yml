version: "3.8"

services:
  herridez-backend:
    build: .
    container_name: herridez-backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_URL=redis://host.docker.internal:6379
      - REDIS_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
